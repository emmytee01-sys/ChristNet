<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RCG His Grace - Hymn Book</title>
    <meta name="description" content="The Reconciliation Church of God International - His Grace Chapel Hymn Book">
    
    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#32CD32">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="His Grace Hymns">
    
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <!-- Landing Page -->
        <div class="landing-page" id="landingPage">
            <div class="landing-content">
                <div class="church-logo">
                    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 2L3 9V22H9V16H15V22H21V9L12 2Z" fill="currentColor"/>
                        <path d="M12 8L16 12L12 16L8 12L12 8Z" fill="#FFFFFF"/>
                    </svg>
                </div>
                
                <div class="church-title">
                    <h1>THE RECONCILIATION CHURCH OF GOD INTERNATIONAL</h1>
                    <p>HIS GRACE CHAPEL</p>
                </div>
                
                <div class="hymn-book-cover">
                    <div class="book-title">HIS GRACE</div>
                    <div class="book-subtitle">Hymn Book</div>
                    <div class="musical-notes">
                        <span>♪</span>
                        <span>♫</span>
                        <span>♪</span>
                    </div>
                </div>
                
                <div class="landing-buttons">
                    <button class="primary-btn" onclick="showMainApp()">
                        📖 Open Hymn Book
                    </button>
                    <button class="secondary-btn" onclick="showCategories()">
                        📂 Browse Categories
                    </button>
                </div>
            </div>
        </div>

        <!-- Install Banner -->
        <div class="install-banner" id="installBanner">
            📱 Tap here to install this app on your device
        </div>

        <!-- Main App -->
        <div class="main-app" id="mainApp">
            <div class="header">
                <button class="back-to-home" onclick="showLanding()">←</button>
                <h1>His Grace Hymn Book</h1>
                <p>Reconciliation Church of God</p>
            </div>

            <div id="mainView">
                <div class="search-bar">
                    <input type="text" class="search-input" id="searchInput" 
                           placeholder="Search by hymn number, title, or keyword...">
                </div>

                <div class="tabs">
                    <button class="tab active" onclick="switchTab('all', event)">All</button>
                    <button class="tab" onclick="switchTab('morning', event)">Morning</button>
                    <button class="tab" onclick="switchTab('evening', event)">Evening</button>
                    <button class="tab" onclick="switchTab('lords-day', event)">Lord's Day</button>
                    <button class="tab" onclick="switchTab('adoration', event)">Adoration</button>
                    <button class="tab" onclick="switchTab('assurance', event)">Assurance</button>
                    <button class="tab" onclick="switchTab('blood-of-jesus', event)">Blood of Jesus</button>
                    <button class="tab" onclick="switchTab('labour-christians-life', event)">Labour & <br>Christians-life</br></button>
                    <button class="tab" onclick="switchTab('warning-judgement', event)">Warning & <br>Judgement</br></button>
                    <button class="tab" onclick="switchTab('decision-devotion', event)">Decision & <br>Devotion</br></button>
                    <button class="tab" onclick="switchTab('grace-forgiveness', event)">Grace & <br> Forgiveness</br></button>
                    <button class="tab" onclick="switchTab('love-guardian-protection', event)">Love, Guardian, <br>Protection</br></button>
                    <button class="tab" onclick="switchTab('faith', event)">Faith </button>
                    <button class="tab" onclick="switchTab('favorites', event)">♥</button>
                </div>

                <div class="content">
                    <div id="allTab" class="category-section active">
                        <ul class="hymn-list" id="allHymnList">
                            <!-- All hymns will be populated here -->
                        </ul>
                    </div>

                    <div id="morningTab" class="category-section">
                        <ul class="hymn-list" id="morningHymnList">
                            <!-- Morning hymns will be populated here -->
                        </ul>
                    </div>

                    <div id="eveningTab" class="category-section">
                        <ul class="hymn-list" id="eveningHymnList">
                            <!-- Evening hymns will be populated here -->
                        </ul>
                    </div>

                    <div id="lords-dayTab" class="category-section">
                        <ul class="hymn-list" id="lordsDayHymnList">
                            <!-- Lord's Day hymns will be populated here -->
                        </ul>
                    </div>

                    <div id="adorationTab" class="category-section">
                        <ul class="hymn-list" id="adorationHymnList">
                            <!-- Adoration hymns will be populated here -->
                        </ul>
                    </div>

                    <div id="assuranceTab" class="category-section">
                        <ul class="hymn-list" id="assuranceHymnList">
                           <!-- Assurance hymns will be populated here -->
                        </ul>
                    </div>

                    <div id="blood-of-jesusTab" class="category-section">
                        <ul class="hymn-list" id="bloodOfJesusHymnList">
                            <!-- Blood of Jesus hymns will be populated here -->
                        </ul>
                    </div>

                    <div id="labour-christians-lifeTab" class="category-section">
                        <ul class="hymn-list" id="labourChristiansLifeHymnList">
                            <!-- Labour & Christians-life hymns will be populated here -->
                        </ul>
                    </div>

                    <div id="warning-judgementTab" class="category-section">
                        <ul class="hymn-list" id="warningJudgementHymnList">
                            <!-- Warning & Judgement hymns will be populated here -->
                        </ul>
                    </div>

                    <div id="decision-devotionTab" class="category-section">
                        <ul class="hymn-list" id="decisionDevotionHymnList">
                            <!-- Decision & Devotion hymns will be populated here -->
                        </ul>
                    </div>

                    <div id="grace-forgivenessTab" class="category-section">
                        <ul class="hymn-list" id="graceForgivenessHymnList">
                            <!-- Grace & Forgiveness hymns will be populated here -->
                        </ul>
                    </div>

                    <div id="love-guardian-protectionTab" class="category-section">
                        <ul class="hymn-list" id="loveGuardianProtectionHymnList">
                            <!-- Love, Guardian, Protection hymns will be populated here -->
                        </ul>
                    </div>

                    <div id="faithTab" class="category-section">
                        <ul class="hymn-list" id="faithHymnList">
                            <!-- Faith hymns will be populated here -->
                        </ul>
                    </div>

                    <div id="favoritesTab" class="favorites">
                        <div id="favoritesList">
                            <div class="empty-state">
                                <h3>No Favorites Yet</h3>
                                <p>Tap the heart icon on any hymn to add it to your favorites.</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="hymn-detail" id="hymnDetail">
                <button class="back-btn" onclick="goBack()">← Back to Hymns</button>
                <div id="hymnContent"></div>
            </div>

            <div class="font-controls" id="fontControls" style="display: none;">
                <button class="font-btn" onclick="changeFontSize(1)" title="Increase font size">A+</button>
                <button class="font-btn" onclick="changeFontSize(-1)" title="Decrease font size">A-</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
